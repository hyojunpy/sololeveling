# .coderabbit.yaml
language: "ko-KR" # 리뷰 언어: 한국어
early_access: false

reviews:
  profile: "balanced" # chill → balanced (코멘트가 조금 더 구체적이고 실용적)
  request_changes_workflow: true # 리뷰 후 자동 승인/변경 요청
  high_level_summary: true # PR 요약 제공
  poem: true # 시 기능 유지
  review_status: true # 리뷰 상태 표시
  collapse_walkthrough: false
  auto_review:
    enabled: true # 자동 리뷰 켜기
    drafts: false # Draft PR은 제외

chat:
  auto_reply: true
